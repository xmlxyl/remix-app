name: Shopify App Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shopify-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to Windows Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASS }}
          port: 22
          script_stop: true
          script: |
            $ErrorActionPreference = "Stop"
            Set-Location "C:\shopify-app"
            Write-Host "PWD: $(Get-Location)"
            Write-Host "Before: $(git rev-parse HEAD)"
            git fetch origin main
            git reset --hard origin/main
            Write-Host "After:  $(git rev-parse HEAD)"
            npm.cmd ci
            npm.cmd run build
            pm2 describe shopify-app *> $null
            if ($LASTEXITCODE -eq 0) {
              pm2 restart shopify-app
            } else {
              pm2 start start.cjs --name shopify-app
            }
            pm2 save
