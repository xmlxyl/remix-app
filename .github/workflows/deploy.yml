name: Shopify App Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shopify-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to Windows Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASS }}
          debug: true
          request_pty: true
          port: 22
          script: |
            @echo off
            cd /d C:\shopify-app || (echo "C:\shopify-app not found" && exit 1)
            echo PWD: %cd%
            hostname
            whoami
            git remote -v

            echo --- BEFORE ---
            git rev-parse HEAD || (echo "rev-parse HEAD failed" && exit 1)
            git rev-parse origin/main || echo "origin/main not available before fetch"

            echo --- Sync code ---
            git fetch origin main || (echo "git fetch failed" && exit 1)
            git reset --hard origin/main || (echo "git reset failed" && exit 1)

            echo --- AFTER ---
            git rev-parse HEAD || (echo "rev-parse HEAD after reset failed" && exit 1)
            git rev-parse origin/main || (echo "rev-parse origin/main after fetch failed" && exit 1)
            git status -sb

            echo --- Install & build ---
            call npm.cmd ci || (echo "npm ci failed" && exit 1)
            call npm.cmd run build || (echo "npm build failed" && exit 1)

            echo --- PM2 ---
            pm2 describe shopify-app >nul 2>&1
            if errorlevel 1 (
              pm2 start start.cjs --name shopify-app || (echo "pm2 start failed" && exit 1)
            ) else (
              pm2 restart shopify-app || (echo "pm2 restart failed" && exit 1)
            )
            pm2 save || (echo "pm2 save failed" && exit 1)

            echo --- VERIFY ---
            pm2 list
            git log -1 --oneline
