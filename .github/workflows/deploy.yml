name: Shopify App Auto Deploy

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时才触发。如果你用的是 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Windows Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASS }}
          port: 22
          script: |
            echo "--- Checking directory ---"
            cd /d C:\shopify-app || exit 1
            
            echo "--- Pulling latest code ---"
            git config --global --add safe.directory C:/shopify-app
            git fetch origin main
            git reset --hard origin/main
            
            echo "--- Installing dependencies ---"
            call npm install
            
            echo "--- Building project ---"
            call npm run build
            
            echo "--- Restarting PM2 ---"
            # 尝试通过我们之前成功的 start.cjs 或者直接用路径
            pm2 restart shopify-app || pm2 start ./node_modules/@react-router/serve/dist/cli.js --name "shopify-app" -- ./build/server/index.js
            
            echo "--- Deployment Complete ---"