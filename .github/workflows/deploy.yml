name: Windows Auto Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "📦 进入项目目录"
            cd C:/shopify-app

            echo "🔄 拉取最新代码"
            git pull origin main

            echo "📦 安装依赖"
            npm install

            echo "🏗 构建项目"
            npm run build

            echo "🔄 重启 PM2"
            pm2 restart shopify-app || pm2 start "C:/shopify-app/build/server/index.js" --name shopify-app

            pm2 save

            echo "✅ 部署完成"