name: Shopify App Auto Deploy

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时才触发。如果你用的是 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Windows Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASS }}
          port: 22
          script: |
            cd /d C:\shopify-app
            # 解决 Windows 目录下 Git 的权限安全检查问题
            git config --global --add safe.directory C:/shopify-app
            
            # 强制重置本地修改并拉取最新代码
            git fetch --all
            git reset --hard origin/main
            
            # 执行构建
            call npm install --production
            call npm run build
            
            # 使用我们之前验证成功的 PM2 启动方式
            pm2 delete shopify-app || cd .
            pm2 start ./node_modules/@react-router/serve/dist/cli.js --name "shopify-app" -- ./build/server/index.js
            pm2 save