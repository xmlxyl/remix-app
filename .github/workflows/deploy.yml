name: Windows Auto Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e   # 一旦有错误立即退出

            # ✅ 加载 nvm（关键）
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 24.14.1
            
            echo "📦 进入项目目录"
            cd /root/remix-app

            echo "🔄 拉取最新代码"
            git pull origin main

            echo "📦 安装依赖"
            npm ci

            echo "🏗 构建项目"
            npm run build

            echo "🔄 启动/重启 PM2 服务"

            # 判断进程是否存在
            pm2 describe react-router-serve > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "♻️  进程已存在，执行重启"
              pm2 restart react-router-serve
            else
              echo "🚀  首次启动进程"
              pm2 start npm --name react-router-serve -- start
            fi

            # 保存进程列表，开机自启
            pm2 save

            echo "✅ 部署完成"