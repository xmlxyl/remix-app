name: Shopify App Auto Deploy

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时才触发。如果你用的是 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Windows Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASS }}
          port: 22
          script: |
            cd C:\shopify-app
            git pull origin main
            npm install
            npm run build
            # 删掉旧进程（即使不存在也不报错）并启动新进程
            pm2 delete shopify-app || true
            pm2 start ./node_modules/@react-router/serve/dist/cli.js --name "shopify-app" -- ./build/server/index.js
            pm2 save